---
# ======================================================================
# 1. EVITAR PERDA DE CONEXAO WINRM DURANTE AUTOMACAO
# ======================================================================
- name: Ajustar configuracoes de energia para estabilidade da automacao
  block:

    - name: Desativar suspensao (Sleep) quando conectado na tomada
      ansible.windows.win_command: powercfg /change standby-timeout-ac 0
      changed_when: false

    - name: Garantir que o timeout da tela bloqueada esteja visivel
      ansible.windows.win_command: powercfg -attributes SUB_VIDEO VIDEOCONLOCK -ATTRIB_HIDE
      changed_when: false

    - name: Impedir que a tela desligue quando o Windows estiver bloqueado
      ansible.windows.win_shell: |
        powercfg -setacvalueindex scheme_current sub_video videoconlock 0
        powercfg -setactive scheme_current
      changed_when: false   

# ======================================================================
# 2. CONFIGURAÇÃO DE NOME DA MÁQUINA (Hostname)
# ======================================================================

- name: Solicitar novo nome para a maquina (Apenas se nao seguir o padrao BRAPO)
  ansible.builtin.pause:
    prompt: "\n[ATENCAO] O nome atual e '{{ ansible_hostname }}'.\nDigite o novo nome do PC (ex: BRAPO1NT002) e pressione ENTER"
  register: prompt_novo_nome
  when: not ansible_hostname.startswith('BRAPO')

- name: Renomear o computador no Windows
  ansible.windows.win_hostname:
    name: "{{ prompt_novo_nome.user_input | trim }}"
  register: result_rename
  when: 
    - not ansible_hostname.startswith('BRAPO')
    - prompt_novo_nome.user_input is defined
    - prompt_novo_nome.user_input | trim != ''

- name: Reiniciar o Windows para aplicar o novo nome imediatamente
  ansible.windows.win_reboot:
    msg: "O Ansible esta reiniciando o Windows para aplicar o novo nome antes de instalar o Antivirus."
    pre_reboot_delay: 5      # Espera 5 segundos antes de mandar o comando
    post_reboot_delay: 15    # Espera 15 segundos depois que o PC voltar para garantir que os serviços subiram
    reboot_timeout: 600      # Espera no maximo 10 minutos pro PC voltar
  # A MAGICA: Ele SÓ vai reiniciar se a tarefa de cima realmente alterou o nome!
  when: result_rename.changed
  
# ======================================================================
# 3. VALIDAÇÕES DO SISTEMA (Pre-checks)
# ======================================================================

- name: Exibir informações do sistema operacional
  debug:
    # Usando as variaveis nativas corretas do Windows
    msg: "Sistema: {{ ansible_distribution }} (Versão: {{ ansible_distribution_version }})"

- name: Validar se a versão do Windows é compatível
  assert:
    that:
      # O filtro "version" compara versões de forma inteligente (ex: entende que 10.0.2 é maior que 10.0)
      - ansible_distribution_version is version(min_windows_version, '>=')
    fail_msg: "FALHA: O Windows precisa ser versão {{ min_windows_version }} ou superior."
    success_msg: "OK: Versão do Windows validada."

- name: Validar se o PowerShell é compatível
  assert:
    that:
      # Puxando a sua variável min_powershell_version da pasta vars!
      - ansible_powershell_version >= min_powershell_version
    fail_msg: "FALHA: PowerShell versão {{ min_powershell_version }} ou superior é necessário."
    success_msg: "OK: PowerShell validado (v{{ ansible_powershell_version }})."

- name: Verificar conectividade de rede (Saída para a Internet)
  ansible.windows.win_shell: (Test-NetConnection -ComputerName 8.8.8.8 -WarningAction SilentlyContinue).PingSucceeded
  register: network_check
  changed_when: false

- name: Validar conectividade com a internet
  assert:
    that:
      - network_check.stdout | trim == 'True'
    fail_msg: "FALHA: A máquina não consegue pingar o 8.8.8.8."
    success_msg: "OK: Acesso à internet confirmado."

# ======================================================================
# 4. CONFIGURAÇÕES BASE (Estado desejado)
# ======================================================================

- name: Garantir que a pasta temporaria padrao exista
  ansible.windows.win_file:
    path: C:\Temp
    state: directory

- name: Configurar o Fuso Horario para o padrao Brasileiro
  community.windows.win_timezone:
    timezone: E. South America Standard Time