---
- name: Baseline Windows 11 - Instalacao de Softwares
  hosts: windows
  gather_facts: yes

  vars:
    execution_timestamp: "{{ ansible_date_time.iso8601 }}"

  pre_tasks:
    - name: Iniciar playbook
      debug:
        msg: "Iniciando Baseline Windows 11 em {{ execution_timestamp }}"
      tags:
        - always

  roles:
    - role: common
      tags:
        - common
        - pre-check
      
    - role: chocolatey
      tags:
        - chocolatey
      
    - role: chrome
      tags:
        - chrome

    - role: gcpw
      tags:
        - gcpw
    
    - role: bitdefender
      tags:
        - bitdefender
    
    - role: glpi_agent
      tags:
        - glpi

  post_tasks:
    - name: Resumo da execução
      debug:
        msg: |
          ========================================
          Baseline Windows 11 - CONCLUÍDO
          ========================================
          Host: {{ inventory_hostname }}
          Data/Hora: {{ execution_timestamp }}
          Status: SUCESSO
          ========================================
      tags:
        - always
